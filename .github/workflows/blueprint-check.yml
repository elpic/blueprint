# Generated from setup.bp — do not edit directly.
# Regenerate: blueprint render setup.bp --template . --output .github/workflows \
#   --var BLUEPRINT_FILE=setup.bp --var TEMPLATE=@github:elpic/templates@main:actions/github/integration/go --var AGAINST=.github/workflows
# Check drift:  blueprint check setup.bp --template . --against .github/workflows \
#   --var BLUEPRINT_FILE=setup.bp --var TEMPLATE=@github:elpic/templates@main:actions/github/integration/go --var AGAINST=.github/workflows

name: Blueprint Drift Check

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:

  blueprint-check:
    name: Blueprint Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: elpic/actions/github/blueprint-check@v1
        with:
          blueprint-file: setup.bp
          template: @github:elpic/templates@main:actions/github/integration/go
          against: .github/workflows
