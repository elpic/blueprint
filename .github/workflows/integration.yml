# Generated from setup.bp — do not edit directly.
# Regenerate: blueprint render setup.bp --template . --output .github/workflows --var APP_NAME=blueprint
# Check drift:  blueprint check setup.bp --template . --against .github/workflows --var APP_NAME=blueprint

name: Integration

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  actions: read
  contents: read

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: elpic/actions/integration/go/test@v1
        with:
          setup: mise
          test-coverage-task: test:coverage

  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: elpic/actions/integration/go/lint@v1
        with:
          setup: mise
          lint-task: lint

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - name: Build
        run: mise run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blueprint-binaries
          path: blueprint-*

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    timeout-minutes: 10
    steps:
      - uses: elpic/actions/integration/go/integration-tests@v1
        with:
          setup: mise
          app-name: blueprint
          integration-task: test:integration

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: elpic/actions/integration/go/security@v1
        with:
          setup: mise
          security-task: security
