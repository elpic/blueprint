name: Drift Check

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:

  drift-check:
    name: Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: 'Check setup.bp'
        uses: elpic/actions/github/drift-check@v1
        with:
          blueprint-file: 'setup.bp'
          template: '@github:elpic/templates@main:actions/github/integration/go'
          against: '.github/workflows'

      - name: 'Check setup.bp'
        uses: elpic/actions/github/drift-check@v1
        with:
          blueprint-file: 'setup.bp'
          template: '@github:elpic/templates@main:actions/github/drift-check'
          against: '.github/workflows'

