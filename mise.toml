# Blueprint Build System Configuration
# ===================================
#
# This file configures the mise task runner for Blueprint's build system.
# Replace the previous Justfile with a more organized and powerful task system.
#
# Quick Start:
#   mise run build     # Build for all platforms
#   mise run test      # Run all tests  
#   mise run check     # Run comprehensive checks
#   mise tasks         # Show available tasks
#
# For more information: https://mise.jdx.dev/tasks/

# Tool Versions
# =============
# Define the exact versions of tools required for development
[tools]
go = "1.24.1"
golangci-lint = "2.11.3"
# Note: gosec is installed via go install in the security task since it's not in mise registry

# Environment Configuration
# =========================
# Load environment variables from .env file if it exists
[env]
_.file = ".env"

# Build Tasks
# ===========
# Cross-platform build tasks for Blueprint binaries

[tasks.build]
description = "Build for all platforms (Linux, Windows, macOS)"
depends = ["build:linux", "build:windows", "build:macos"]
alias = "b"

[tasks."build:linux"]
description = "Build for Linux (amd64 and arm64)"
hide = true
run = [
  'GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev) -X main.commit=$(git rev-parse --short HEAD)" -o blueprint-linux-amd64 ./cmd/blueprint',
  'GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev) -X main.commit=$(git rev-parse --short HEAD)" -o blueprint-linux-arm64 ./cmd/blueprint'
]

[tasks."build:windows"]
description = "Build for Windows (amd64)"
hide = true
run = 'GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev) -X main.commit=$(git rev-parse --short HEAD)" -o blueprint-windows-amd64.exe ./cmd/blueprint'

[tasks."build:macos"]
description = "Build for macOS (amd64 and arm64)"
hide = true
run = [
  'GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev) -X main.commit=$(git rev-parse --short HEAD)" -o blueprint-macos-amd64 ./cmd/blueprint',
  'GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev) -X main.commit=$(git rev-parse --short HEAD)" -o blueprint-macos-arm64 ./cmd/blueprint'
]

# Test Tasks
# ==========
# Testing tasks for different scenarios and coverage reporting

[tasks.test]
description = "Run all tests"
run = "go test ./..."
alias = "t"

[tasks."test:coverage"]
description = "Run all tests with coverage report"
hide = true
run = "go test -coverprofile=coverage.out ./..."

[tasks."test:unit"]
description = "Run unit tests only"
hide = true
run = "go test ./internal/handlers/unit/..."

[tasks."test:integration"]
description = "Run integration tests only"
hide = true
run = "go test -v -race -run Integration ./..."

# Quality Assurance Tasks
# =======================
# Code formatting, linting, and security scanning

[tasks.format]
description = "Format code with gofmt"
run = "go fmt ./..."
alias = "f"

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./... --timeout=5m"
alias = "l"

[tasks.security]
description = "Run security scan with gosec"
run = [
  "go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7",
  "PATH=\"$(go env GOPATH)/bin:$PATH\" gosec -exclude=G204,G304,G115 ./..."
]
alias = "s"

[tasks.check]
description = "Run all checks (test, lint, security)"
depends = ["test", "lint", "security"]
alias = "c"

# Maintenance Tasks
# =================
# Clean up artifacts and manage dependencies

[tasks.clean]
description = "Remove all build artifacts"
run = [
  "rm -f blueprint blueprint-*",
  "go clean -testcache"
]

[tasks.deps]
description = "Download and tidy Go dependencies"
run = [
  "go mod download",
  "go mod tidy"
]

# Development Tasks
# =================
# Tasks for development workflow

[tasks.run]
description = "Build and run blueprint"
run = [
  'go build -ldflags "-X main.version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev) -X main.commit=$(git rev-parse --short HEAD)" -o blueprint ./cmd/blueprint',
  "./blueprint"
]

[tasks.deploy]
description = "Build and copy blueprint to remote host via SCP"
depends = ["build"]
run = '''
if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_TARGET" ]; then
  scp blueprint-$DEPLOY_TARGET "$DEPLOY_USER@$DEPLOY_HOST:blueprint"
fi
'''

[tasks."deploy:test"]
description = "Deploy to remote and run a blueprint command. Usage: mise run deploy:test -- doctor"
depends = ["deploy"]
run = '''
if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ]; then
  echo "DEPLOY_HOST and DEPLOY_USER must be set" >&2
  exit 1
fi
ssh "$DEPLOY_USER@$DEPLOY_HOST" -- '~/blueprint' "$@"
'''